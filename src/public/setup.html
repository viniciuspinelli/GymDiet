<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup - GymDiet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .logo p {
      color: #888;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-bottom: 20px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .message.sucesso {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.erro {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .info-box {
      background: #f0f7ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 25px;
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .info-box strong {
      color: #667eea;
    }

    .already-configured {
      text-align: center;
      color: #666;
    }

    .already-configured h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 20px;
    }

    .already-configured p {
      margin-bottom: 20px;
      color: #888;
    }

    .already-configured a {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: transform 0.2s;
    }

    .already-configured a:hover {
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      .logo h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>💪 GymDiet</h1>
      <p>Seu gerenciador pessoal de fitness e dieta</p>
    </div>

    <div id="formSetup">
      <div class="info-box">
        <strong>👋 Bem-vindo!</strong><br>
        Esta é a primeira inicialização. Crie suas credenciais de administrador para começar.
      </div>

      <div id="mensagem" class="message"></div>

      <form id="setupForm">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="escolha um nome de usuário"
            required
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="mínimo 6 caracteres"
            required
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Senha</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="confirme sua senha"
            required
            autocomplete="new-password"
          />
        </div>

        <button type="submit" id="btnSubmit">Criar Admin</button>
      </form>
    </div>

    <div id="jaConfigurado" class="already-configured" style="display: none;">
      <h2>✅ Já Configurado</h2>
      <p>O administrador já foi criado anteriormente.</p>
      <a href="/auth/login">Ir para Login →</a>
    </div>
  </div>

  <script>
    // Verificar se admin já existe
    async function verificarAdminExiste() {
      try {
        const res = await fetch('/setup/admin-existe');
        const data = await res.json();

        if (data.existe) {
          document.getElementById('formSetup').style.display = 'none';
          document.getElementById('jaConfigurado').style.display = 'block';
        }
      } catch (err) {
        console.error('Erro ao verificar admin:', err);
      }
    }

    // Submeter formulário
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const mensagem = document.getElementById('mensagem');
      const btnSubmit = document.getElementById('btnSubmit');

      // Validação básica no cliente
      if (!username || !password || !confirmPassword) {
        mensagem.textContent = 'Todos os campos são obrigatórios';
        mensagem.className = 'message erro';
        return;
      }

      if (password !== confirmPassword) {
        mensagem.textContent = 'As senhas não coincidem';
        mensagem.className = 'message erro';
        return;
      }

      if (password.length < 6) {
        mensagem.textContent = 'Senha deve ter pelo menos 6 caracteres';
        mensagem.className = 'message erro';
        return;
      }

      // Desabilitar botão
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Criando...';
      mensagem.className = 'message';
      mensagem.textContent = '';

      try {
        const res = await fetch('/setup/setup-admin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password, confirmPassword })
        });

        const data = await res.json();

        if (data.sucesso) {
          mensagem.textContent = '✅ Admin criado com sucesso! Redirecionando...';
          mensagem.className = 'message sucesso';

          setTimeout(() => {
            window.location.href = '/auth/login';
          }, 2000);
        } else {
          mensagem.textContent = '❌ ' + (data.erro || 'Erro ao criar admin');
          mensagem.className = 'message erro';
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Criar Admin';
        }
      } catch (err) {
        console.error('Erro:', err);
        mensagem.textContent = '❌ Erro de conexão. Tente novamente.';
        mensagem.className = 'message erro';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Criar Admin';
      }
    });

    // Verificar ao carregar
    document.addEventListener('DOMContentLoaded', verificarAdminExiste);
  </script>
</body>
</html>
